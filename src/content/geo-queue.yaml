# ============================================================
# geo-queue.yaml
# File d'attente des pages GEO à générer automatiquement
# ============================================================
# Le script seo-auto-generate.mjs pioche le premier `pending`
# trié par priorité. Statuts possibles :
#   - pending   : en file
#   - published : publié en direct (score brand-check >= 8)
#   - pr-review : PR créée, en attente de review Enzo
#   - skipped   : rejeté (score < 8 sur 3 tentatives)
# Ordre tri : priority DESC, puis ordre du fichier.
# ============================================================

