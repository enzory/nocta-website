# ============================================================
# .github/workflows/seo-cron.yml
# Génération automatique de pages GEO pour NOCTA
# ============================================================
# Rythme : 3 fois par semaine (lun / mer / ven à 03h00 UTC = 05h Paris)
# Peut aussi être déclenché à la main depuis l'onglet Actions.
#
# Flux :
#   1. Checkout repo
#   2. Setup Node 20 + install deps (@anthropic-ai/sdk, yaml)
#   3. Run scripts/seo-auto-generate.mjs
#   4. Si status == "published" → commit direct sur main
#   5. Si status == "pr-review" → crée une branche + PR
#   6. Si status == "empty-queue" ou "error" → log, pas de commit
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - ANTHROPIC_API_KEY
# ============================================================

name: SEO auto-generate

on:
  schedule:
    # Lundi, mercredi, vendredi à 03h00 UTC
    - cron: "0 3 * * 1,3,5"
  workflow_dispatch: # permet le lancement manuel

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          # On s'assure que les deps nécessaires au script sont présentes.
          # @anthropic-ai/sdk et yaml sont dans package.json (cf. setup).
          npm ci

      - name: Run SEO auto-generate
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          RESULT=$(node scripts/seo-auto-generate.mjs 2>&1 | tee /tmp/gen.log | tail -n 1)
          echo "Generation result: $RESULT"
          echo "result=$RESULT" >> $GITHUB_OUTPUT

          # Extrait les champs utiles
          STATUS=$(echo "$RESULT" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).status||"")}catch{}})')
          SLUG=$(echo "$RESULT" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).slug||"")}catch{}})')
          SCORE=$(echo "$RESULT" | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{try{console.log(JSON.parse(d).score||"")}catch{}})')

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "slug=$SLUG"     >> $GITHUB_OUTPUT
          echo "score=$SCORE"   >> $GITHUB_OUTPUT

      - name: Configure git
        if: steps.gen.outputs.status == 'published' || steps.gen.outputs.status == 'pr-review'
        run: |
          git config user.name  "nocta-seo-bot"
          git config user.email "seo-bot@noctaparis.fr"

      # ---------- CAS 1 : auto-publish direct sur main ----------
      - name: Commit + push (auto-publish)
        if: steps.gen.outputs.status == 'published'
        run: |
          git add src/content/geo/ src/content/geo-queue.yaml
          git commit -m "feat(seo): auto-publish ${{ steps.gen.outputs.slug }} (score ${{ steps.gen.outputs.score }})"
          git push origin main

      # ---------- CAS 2 : PR pour relecture Enzo ----------
      - name: Create PR (pr-review)
        if: steps.gen.outputs.status == 'pr-review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="seo/auto-${{ steps.gen.outputs.slug }}"
          git checkout -b "$BRANCH"
          git add src/content/geo/ src/content/geo-queue.yaml
          git commit -m "feat(seo): draft ${{ steps.gen.outputs.slug }} — review requise (score ${{ steps.gen.outputs.score }})"
          git push origin "$BRANCH"

          SLUG="${{ steps.gen.outputs.slug }}"
          SCORE="${{ steps.gen.outputs.score }}"
          PR_BODY=$(printf 'Page GEO générée automatiquement, brand-check a flaggé des points à vérifier.\n\n**Slug** : %s\n**Score** : %s/10\n\nRelire le draft dans `src/content/geo/%s.md` avant merge.\n\n---\n_Généré automatiquement par seo-cron._' "$SLUG" "$SCORE" "$SLUG")
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "[SEO auto] $SLUG — review requise" \
            --body "$PR_BODY"

      # ---------- Log en cas de queue vide ----------
      - name: Empty queue notice
        if: steps.gen.outputs.status == 'empty-queue'
        run: echo "::notice::Queue GEO vide. Ajoute des sujets dans src/content/geo-queue.yaml."

      # ---------- Upload log en artifact si erreur ----------
      - name: Upload log on error
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-gen-log
          path: /tmp/gen.log
          retention-days: 14
